apiVersion: batch/v1
kind: Job
metadata:
  name: '{{ include "user.fullname" . }}-db-job'
  labels:
    app: {{ include "user.fullname" . }}
    job: database
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: {{ include "user.fullname" . }}
        job: database
    spec:
      initContainers:
        - name: check-user-db-ready
          image: busybox:latest
          command: ['sh', '-c',
            'until nc -z -w1 {{ .Values.database.host }} {{ .Values.database.port }};
            do echo waiting for database; sleep 2; done;']
      containers:
        - name: database
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              echo "Running DB migrations..." &&
              pnpm exec mikro-orm migration:up &&
              echo "Running seeders..." &&
              pnpm exec mikro-orm seeder:run
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: USER_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ index .Values.configMaps "user-db" "name" | quote }}
                  key: POSTGRES_HOST
      restartPolicy: Never
