    - image: sergeyarenzon/rapidguide-reservation
      context: .
      docker:
        dockerfile: services/reservation/Dockerfile.dev
      sync:
        manual:
          - src: "services/reservation/src/**/*.ts"
            dest: services/reservation
          - src: "services/reservation/src/**/*.json"
            dest: services/reservation
    # - image: sergeyarenzon/rapidguide-notification
    #   context: services/notification
    #   docker:
    #     dockerfile: Dockerfile
  tagPolicy:
    gitCommit: {}
  local:
    useBuildkit: true
portForward:
  - resourceType: service
    resourceName: rabbitmq
    port: 15672
    # RabbitMQ Management UI → http://localhost:15672 (admin / admin)
manifests:
  helm:
    releases:
      - name: gateway
        chartPath: k8s/helm/gateway/
        valuesFiles:
          - k8s/helm/gateway/values.yaml
      # - name: notification
      #   chartPath: k8s/helm/notification/
      #   valuesFiles:
      #     - k8s/helm/notification/values.yaml
      - name: ingress-nginx
        chartPath: k8s/helm/ingress-nginx/
        valuesFiles:
          - k8s/helm/ingress-nginx/values.yaml
      - name: secrets
        chartPath: k8s/helm/secrets/
        valuesFiles:
          - k8s/helm/secrets/values.yaml
      # - name: auth-db
      #   chartPath: k8s/helm/auth-db/
      #   valuesFiles:
      #     - k8s/helm/auth-db/values.yaml
      # - name: user-db
      #   chartPath: k8s/helm/user-db/
      #   valuesFiles:
      #     - k8s/helm/user-db/values.yaml
      # - name: tour-db
      #   chartPath: k8s/helm/tour-db/
      #   valuesFiles:
      #     - k8s/helm/tour-db/values.yaml
      - name: reservation-db
        chartPath: k8s/helm/reservation-db/
        valuesFiles:
          - k8s/helm/reservation-db/values.yaml
      # - name: auth
      #   chartPath: k8s/helm/auth/
      #   valuesFiles:
      #     - k8s/helm/auth/values.yaml
      # - name: user
      #   chartPath: k8s/helm/user/
      #   valuesFiles:
      #     - k8s/helm/user/values.yaml
      # - name: tour
      #   chartPath: k8s/helm/tour/
      #   valuesFiles:
      #     - k8s/helm/tour/values.yaml
      - name: reservation
        chartPath: k8s/helm/reservation/
        valuesFiles:
          - k8s/helm/reservation/values.yaml
      - name: rabbitmq
        remoteChart: oci://registry-1.docker.io/cloudpirates/rabbitmq
        valuesFiles:
          - k8s/helm/rabbitmq/values.yaml
      # - name: redis
      #   repo: https://charts.bitnami.com/bitnami
      #   remoteChart: redis
      #   valuesFiles:
      #     - k8s/helm/redis/values.yaml
  hooks:
    before:
      # Create global-secrets from k8s/helm/secrets/.env
      - host:
          command: ["sh", "-c", "if [ -f k8s/helm/secrets/.env ]; then kubectl create secret generic global-secrets --from-env-file=k8s/helm/secrets/.env --dry-run=client -o yaml | kubectl apply -f -; else echo 'Warning: k8s/helm/secrets/.env not found - global-secrets will not be created'; fi"]
      # Create auth-secrets from k8s/helm/auth/templates/.env
      - host:
          command: ["sh", "-c", "if [ -f k8s/helm/auth/templates/.env ]; then kubectl create secret generic auth-secrets --from-env-file=k8s/helm/auth/templates/.env --dry-run=client -o yaml | kubectl apply -f -; else echo 'Warning: k8s/helm/auth/templates/.env not found - auth-secrets will not be created'; fi"]
